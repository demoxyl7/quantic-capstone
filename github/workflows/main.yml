name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # --- BACKEND CI ---
  backend-tests:
    runs-on: ubuntu-latest
    # Only run if files in the backend folder change
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest  # Ensure pytest is installed for the test
      - name: Run Backend Health Test
        run: pytest

  # --- FRONTEND CI ---
  frontend-build:
    runs-on: ubuntu-latest
    # Only run if files in the frontend folder change
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm install
      - name: Build Frontend
        run: npm run build